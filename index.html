<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTEL TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="app">

  <!-- ═══ HEADER ═══ -->
  <header id="header">
    <div class="brand">
      <div class="brand-icon">◈</div>
      <div class="brand-text">
        <span class="brand-name glitch-title" data-text="INTEL TERMINAL">INTEL TERMINAL</span>
        <span class="brand-sub">IRAN / US CONFLICT FEED</span>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="feed">
        <span class="tab-icon">⊡</span> FEED
      </button>
      <button class="tab" data-tab="explore">
        <span class="tab-icon">⊕</span> EXPLORE
      </button>
    </nav>

    <div class="header-right">
      <div class="status-row">
        <span class="dot" id="dot-status"></span>
        <span id="status-text">LOADING...</span>
      </div>
      <div id="live-clock">--:--:-- UTC</div>
      <button class="icon-btn" id="btn-refresh" title="Refresh feeds">↻</button>
      <button class="icon-btn" id="btn-add" title="Add manual event">+</button>
    </div>
  </header>

  <!-- ═══ FEED VIEW ═══ -->
  <div id="view-feed" class="view active">
    <div class="feed-wrap">

      <!-- loading -->
      <div id="feed-loading" class="splash-state">
        <div class="splash-spinner">◈</div>
        <div class="splash-title">FETCHING LIVE INTEL<span class="cursor"></span></div>
        <div class="splash-sub">Pulling from verified sources across both sides</div>
      </div>

      <!-- error -->
      <div id="feed-error" class="splash-state" style="display:none">
        <div class="splash-err">⚠</div>
        <div class="splash-title" style="color:var(--crit)">FEED SYNC FAILED</div>
        <div class="splash-sub">Check your connection</div>
        <button class="pill-btn" onclick="App.refresh()">↻ RETRY</button>
      </div>

      <!-- stream of cards -->
      <div id="feed-stream" style="display:none"></div>

      <!-- infinite scroll sentinel -->
      <div id="sentinel"></div>

      <!-- load more indicator -->
      <div id="load-more-indicator" style="display:none">
        <div class="load-more-spin">◈</div>
      </div>

    </div>
  </div>

  <!-- ═══ EXPLORE VIEW ═══ -->
  <div id="view-explore" class="view" style="display:none">
    <div class="explore-wrap">

      <div class="explore-header">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="explore-search" placeholder="Search headlines, topics, keywords...">
          <span id="explore-count" class="explore-count">— events</span>
        </div>
      </div>

      <div class="explore-filters">
        <div class="filter-row">
          <span class="filter-row-label">PERSPECTIVE</span>
          <div class="pill-group">
            <button class="pill active" data-key="perspective" data-val="all">ALL</button>
            <button class="pill pill-us"   data-key="perspective" data-val="us">US</button>
            <button class="pill pill-iran" data-key="perspective" data-val="iran">IRAN</button>
            <button class="pill pill-neut" data-key="perspective" data-val="neutral">NEUTRAL</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-row-label">TYPE</span>
          <div class="pill-group">
            <button class="pill active" data-key="type" data-val="all">ALL</button>
            <button class="pill" data-key="type" data-val="military">⚔ MILITARY</button>
            <button class="pill" data-key="type" data-val="nuclear">☢ NUCLEAR</button>
            <button class="pill" data-key="type" data-val="diplomatic">◎ DIPLOMATIC</button>
            <button class="pill" data-key="type" data-val="economic">◈ ECONOMIC</button>
            <button class="pill" data-key="type" data-val="cyber">⚡ CYBER</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-row-label">SEVERITY</span>
          <div class="pill-group">
            <button class="pill active"         data-key="severity" data-val="all">ALL</button>
            <button class="pill pill-crit"   data-key="severity" data-val="critical">CRITICAL</button>
            <button class="pill pill-high"   data-key="severity" data-val="high">HIGH</button>
            <button class="pill pill-medium" data-key="severity" data-val="medium">MEDIUM</button>
            <button class="pill pill-low"    data-key="severity" data-val="low">LOW</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-row-label">DATE</span>
          <div class="pill-group date-group">
            <input type="date" id="ex-date-from" placeholder="From">
            <span style="color:var(--txt-mute);font-size:11px">→</span>
            <input type="date" id="ex-date-to" placeholder="To">
          </div>
          <button class="pill" id="btn-clear-filters" style="margin-left:auto">⊘ CLEAR</button>
        </div>
      </div>

      <div id="explore-stream"></div>
      <div id="explore-sentinel"></div>
    </div>
  </div>

</div>

<!-- ═══ ADD EVENT MODAL ═══ -->
<div id="add-modal">
  <div class="modal-box">
    <div class="modal-top">
      <span class="modal-label">// PIN EVENT</span>
      <button id="modal-close">✕</button>
    </div>
    <form id="add-form">
      <div class="form-grid">
        <div class="fg span2">
          <label>HEADLINE</label>
          <input type="text" name="headline" required placeholder="Event headline...">
        </div>
        <div class="fg">
          <label>DATE</label>
          <input type="date" name="date" required>
        </div>
        <div class="fg">
          <label>SOURCE</label>
          <input type="text" name="sourceName" placeholder="e.g. Reuters">
        </div>
        <div class="fg span2">
          <label>ARTICLE URL</label>
          <input type="url" name="sourceUrl" placeholder="https://...">
        </div>
        <div class="fg span2">
          <label>SUMMARY</label>
          <textarea name="summary" placeholder="What happened..."></textarea>
        </div>
        <div class="fg">
          <label>PERSPECTIVE</label>
          <select name="perspective">
            <option value="neutral">NEUTRAL</option>
            <option value="us">US</option>
            <option value="iran">IRAN</option>
          </select>
        </div>
        <div class="fg">
          <label>TYPE</label>
          <select name="type">
            <option value="military">MILITARY</option>
            <option value="diplomatic">DIPLOMATIC</option>
            <option value="nuclear">NUCLEAR</option>
            <option value="economic">ECONOMIC</option>
            <option value="cyber">CYBER</option>
          </select>
        </div>
        <div class="fg">
          <label>SEVERITY</label>
          <select name="severity">
            <option value="medium">MEDIUM</option>
            <option value="critical">CRITICAL</option>
            <option value="high">HIGH</option>
            <option value="low">LOW</option>
          </select>
        </div>
        <div class="fg">
          <label>TAGS (comma separated)</label>
          <input type="text" name="tags" placeholder="IRGC, sanctions, missile">
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="pill-btn ghost" id="modal-cancel">CANCEL</button>
        <button type="submit" class="pill-btn">⊕ PIN EVENT</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
